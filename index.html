/* ===================== CONTROLLER ===================== */
const themeEl = document.getElementById("theme");
const resumeEl = document.getElementById("resume");
const sel = document.getElementById("tpl");

function apply(key){
  if(!T[key]) key="swiss";
  themeEl.textContent = T[key].css;
  resumeEl.innerHTML = T[key].html(R);
  sel.value = key;
  try { if(location.hash.slice(1) !== key) history.replaceState(null,"","#"+key); } catch(_){ /* sandboxed (about:srcdoc) — hash deep-link disabled, switching still works */ }
  document.title = `${R.name} — Full Stack Developer (${T[key].label})`;
}

sel.addEventListener("change", ()=>apply(sel.value));
window.addEventListener("hashchange", ()=>apply(location.hash.slice(1)));
document.getElementById("print").addEventListener("click", ()=>window.print());

apply(location.hash.slice(1) || "swiss");
</script>
